<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rateify — Rate Everything</title>
<link href="https://fonts.googleapis.com/css2?family=Circular+Std:wght@400;500;700&family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1DB954;
    --green-dim: #158a3e;
    --green-glow: rgba(29,185,84,0.15);
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #181818;
    --bg4: #222222;
    --bg5: #282828;
    --surface: #1a1a1a;
    --surface2: #242424;
    --text: #ffffff;
    --text2: #b3b3b3;
    --text3: #6a6a6a;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.12);
    --gold: #F59E0B;
    --gold-half: #FCD34D;
    --radius: 12px;
    --radius-sm: 8px;
    --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0; width: 240px;
    background: #000;
    display: flex; flex-direction: column;
    z-index: 100;
    border-right: 1px solid var(--border);
  }
  .logo {
    padding: 28px 24px 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: var(--green);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-icon svg { width: 20px; height: 20px; fill: #000; }
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-size: 22px; font-weight: 800;
    letter-spacing: -0.5px;
  }
  .logo-text span { color: var(--green); }
  .nav { padding: 8px 12px; flex: 1; }
  .nav-label {
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    color: var(--text3); text-transform: uppercase;
    padding: 16px 12px 8px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 14px;
    padding: 11px 12px; border-radius: var(--radius-sm);
    cursor: pointer; transition: all var(--transition);
    font-size: 14px; font-weight: 500; color: var(--text2);
    user-select: none;
  }
  .nav-item:hover { background: var(--bg4); color: var(--text); }
  .nav-item.active { background: var(--bg4); color: var(--text); }
  .nav-item.active .nav-icon { color: var(--green); }
  .nav-icon { font-size: 20px; width: 20px; flex-shrink: 0; }
  .nav-icon svg { width: 20px; height: 20px; fill: currentColor; }

  /* MAIN */
  .main {
    margin-left: 240px;
    min-height: 100vh;
    display: flex; flex-direction: column;
  }
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(10,10,10,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 64px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .page-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px; font-weight: 800;
    display: flex; align-items: center; gap: 10px;
  }
  .page-title .page-emoji { font-size: 22px; }
  .topbar-actions { display: flex; align-items: center; gap: 10px; }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 18px; border-radius: 50px;
    font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all var(--transition);
    border: none; outline: none;
  }
  .btn-primary {
    background: var(--green); color: #000;
  }
  .btn-primary:hover { background: #1ed760; transform: scale(1.03); }
  .btn-secondary {
    background: var(--bg4); color: var(--text2);
    border: 1px solid var(--border2);
  }
  .btn-secondary:hover { background: var(--bg5); color: var(--text); }
  .btn-ghost {
    background: transparent; color: var(--text2);
    padding: 8px 12px;
  }
  .btn-ghost:hover { color: var(--text); background: var(--bg4); }
  .btn svg { width: 16px; height: 16px; fill: currentColor; }

  /* CONTENT */
  .content { padding: 32px; flex: 1; }

  /* SECTION HEADER */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px; font-weight: 800;
    display: flex; align-items: center; gap: 10px;
  }
  .section-count {
    background: var(--bg4); color: var(--text3);
    font-size: 11px; font-weight: 600;
    padding: 3px 9px; border-radius: 50px;
    border: 1px solid var(--border);
  }

  /* CARDS GRID */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }
  .card {
    background: var(--bg3);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    transition: all var(--transition);
    cursor: default;
    position: relative;
  }
  .card:hover { background: var(--bg4); border-color: var(--border2); transform: translateY(-2px); }
  .card-img {
    width: 100%; aspect-ratio: 1;
    object-fit: cover;
    background: var(--bg5);
    display: flex; align-items: center; justify-content: center;
    font-size: 48px;
    position: relative; overflow: hidden;
  }
  .card-img img { width: 100%; height: 100%; object-fit: cover; }
  .card-img .placeholder-icon { font-size: 48px; opacity: 0.3; }
  .card-body { padding: 12px; }
  .card-title {
    font-size: 13px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .card-subtitle {
    font-size: 11px; color: var(--text3);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 10px;
  }
  .card-actions { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .btn-watched {
    flex: 1; padding: 7px 0; border-radius: 50px;
    background: var(--green); color: #000;
    font-size: 11px; font-weight: 700;
    border: none; cursor: pointer;
    transition: all var(--transition);
    text-align: center;
  }
  .btn-watched:hover { background: #1ed760; }
  .btn-del {
    width: 28px; height: 28px; border-radius: 50%;
    background: transparent; color: var(--text3);
    border: 1px solid var(--border);
    cursor: pointer; transition: all var(--transition);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .btn-del:hover { background: rgba(255,50,50,0.15); color: #ff4444; border-color: rgba(255,50,50,0.3); }

  /* STAR RATING */
  .star-rating {
    display: flex; align-items: center; gap: 2px;
    margin-bottom: 8px;
  }
  .star-wrap {
    position: relative; width: 20px; height: 20px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .star-wrap svg { width: 18px; height: 18px; transition: transform 0.1s; }
  .star-wrap:hover svg { transform: scale(1.2); }
  .star-full { fill: var(--gold); }
  .star-half { fill: url(#halfGrad); }
  .star-empty { fill: var(--bg5); stroke: var(--text3); stroke-width: 1; }
  .rating-label {
    font-size: 11px; color: var(--text3); margin-left: 4px;
    font-weight: 600;
  }

  /* RANKED LIST */
  .ranked-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 40px; }
  .ranked-item {
    display: flex; align-items: center; gap: 14px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 14px;
    transition: all var(--transition);
    cursor: grab;
  }
  .ranked-item:hover { background: var(--bg4); border-color: var(--border2); }
  .ranked-item.dragging { opacity: 0.5; cursor: grabbing; }
  .ranked-item.drag-over { border-color: var(--green); background: var(--green-glow); }
  .rank-num {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--bg5); color: var(--text3);
    font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .rank-num.top1 { background: rgba(245,158,11,0.2); color: var(--gold); }
  .rank-num.top2 { background: rgba(156,163,175,0.2); color: #9ca3af; }
  .rank-num.top3 { background: rgba(205,127,50,0.2); color: #cd7f32; }
  .ranked-thumb {
    width: 44px; height: 44px; border-radius: var(--radius-sm);
    object-fit: cover; background: var(--bg5);
    flex-shrink: 0; overflow: hidden;
    display: flex; align-items: center; justify-content: center; font-size: 20px;
  }
  .ranked-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .ranked-info { flex: 1; min-width: 0; }
  .ranked-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ranked-sub { font-size: 12px; color: var(--text3); }
  .ranked-stars { display: flex; align-items: center; gap: 2px; }
  .ranked-stars svg { width: 14px; height: 14px; }
  .ranked-rating { font-size: 12px; font-weight: 700; color: var(--gold); margin-left: 4px; }
  .drag-handle {
    color: var(--text3); cursor: grab; padding: 4px;
    display: flex; align-items: center;
  }
  .drag-handle:hover { color: var(--text); }
  .ranked-item .btn-del { margin-left: auto; flex-shrink: 0; }

  /* GRID VIEW */
  .grid-view {
    display: none;
  }
  .grid-view.active { display: grid; }
  .grid-view {
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
  }
  .grid-cell {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: all var(--transition);
    display: flex; flex-direction: column;
  }
  .grid-cell:hover { background: var(--bg4); border-color: var(--border2); transform: translateY(-3px); }
  .grid-cell-img {
    width: 100%; aspect-ratio: 1;
    position: relative; overflow: hidden;
    background: var(--bg5);
    flex-shrink: 0;
  }
  .grid-cell-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .grid-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center; font-size: 36px;
    background: var(--bg5);
  }
  .grid-rank-badge {
    position: absolute; top: 8px; left: 8px;
    background: rgba(0,0,0,0.75); color: var(--text);
    font-size: 11px; font-weight: 700;
    padding: 3px 8px; border-radius: 50px;
    backdrop-filter: blur(4px);
  }
  .grid-rank-badge.gold { background: rgba(245,158,11,0.85); color: #000; }
  .grid-rank-badge.silver { background: rgba(156,163,175,0.85); color: #000; }
  .grid-rank-badge.bronze { background: rgba(205,127,50,0.85); color: #000; }
  .grid-cell-body { padding: 10px 12px 12px; }
  .grid-title {
    font-size: 12px; font-weight: 600; color: var(--text);
    line-height: 1.3; margin-bottom: 6px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .grid-sub { font-size: 11px; color: var(--text3); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .grid-rating-row { display: flex; align-items: center; gap: 4px; }
  .grid-rating-stars { display: flex; gap: 1px; }
  .grid-rating-stars svg { width: 11px; height: 11px; }
  .grid-rating-num { font-size: 11px; font-weight: 700; color: var(--gold); margin-left: 2px; }
  .grid-unrated { font-size: 11px; color: var(--text3); font-style: italic; }

  /* ADD MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    z-index: 200;
    display: none; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 20px;
    width: 520px; max-width: 95vw;
    max-height: 90vh; overflow-y: auto;
    padding: 32px;
    animation: slideUp 0.25s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  .modal-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px; font-weight: 800;
  }
  .modal-close {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--bg5); border: 1px solid var(--border);
    color: var(--text2); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; transition: all var(--transition);
  }
  .modal-close:hover { background: var(--bg4); color: var(--text); }

  /* TABS */
  .tabs {
    display: flex; gap: 4px;
    background: var(--bg);
    border-radius: 50px; padding: 4px;
    margin-bottom: 24px;
    border: 1px solid var(--border);
  }
  .tab {
    flex: 1; padding: 8px;
    border-radius: 50px;
    font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all var(--transition);
    text-align: center; color: var(--text3);
  }
  .tab.active { background: var(--bg4); color: var(--text); }

  /* FORM */
  .form-group { margin-bottom: 18px; }
  .form-label {
    font-size: 12px; font-weight: 600; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.8px;
    margin-bottom: 8px; display: block;
  }
  .form-input {
    width: 100%; padding: 12px 14px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-size: 14px; font-family: inherit;
    transition: border-color var(--transition);
    outline: none;
  }
  .form-input:focus { border-color: var(--green); }
  .form-input::placeholder { color: var(--text3); }

  /* SEARCH RESULTS */
  .search-results {
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    overflow: hidden;
    margin-top: -10px; margin-bottom: 18px;
    max-height: 280px; overflow-y: auto;
    display: none;
  }
  .search-results.open { display: block; }
  .search-result-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; cursor: pointer;
    transition: background var(--transition);
    border-bottom: 1px solid var(--border);
  }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover { background: var(--bg4); }
  .search-result-img {
    width: 44px; height: 44px; border-radius: 6px;
    object-fit: cover; flex-shrink: 0; background: var(--bg5);
  }
  .search-result-title { font-size: 13px; font-weight: 600; }
  .search-result-sub { font-size: 12px; color: var(--text3); }
  .search-loading { padding: 20px; text-align: center; color: var(--text3); font-size: 13px; }

  /* IMAGE UPLOAD */
  .upload-area {
    border: 2px dashed var(--border2);
    border-radius: var(--radius);
    padding: 24px; text-align: center;
    cursor: pointer; transition: all var(--transition);
  }
  .upload-area:hover { border-color: var(--green); background: var(--green-glow); }
  .upload-preview {
    width: 80px; height: 80px; border-radius: var(--radius-sm);
    object-fit: cover; margin: 0 auto 12px;
    display: none;
  }
  .upload-preview.show { display: block; }
  .upload-text { font-size: 13px; color: var(--text3); }
  .upload-text span { color: var(--green); font-weight: 600; }

  /* DIVIDER */
  .divider {
    border: none; border-top: 1px solid var(--border);
    margin: 32px 0;
  }

  /* VIEW TOGGLE */
  .view-toggle {
    display: flex; gap: 4px;
    background: var(--bg4); border-radius: 50px; padding: 3px;
    border: 1px solid var(--border);
  }
  .view-btn {
    padding: 6px 10px; border-radius: 50px;
    cursor: pointer; transition: all var(--transition);
    color: var(--text3); font-size: 14px;
    border: none; background: transparent;
    display: flex; align-items: center; justify-content: center;
  }
  .view-btn svg { width: 16px; height: 16px; fill: currentColor; }
  .view-btn.active { background: var(--bg2); color: var(--text); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--text3);
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
  .empty-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: var(--text2); }
  .empty-sub { font-size: 13px; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--bg4); color: var(--text);
    padding: 12px 20px; border-radius: 50px;
    font-size: 13px; font-weight: 600;
    border: 1px solid var(--border2);
    z-index: 999;
    transform: translateY(80px); opacity: 0;
    transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    display: flex; align-items: center; gap: 8px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }

  /* PAGE */
  .page { display: none; }
  .page.active { display: block; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg5); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

  /* SECTION DIVIDER */
  .section-divider {
    display: flex; align-items: center; gap: 16px; margin: 8px 0 20px;
  }
  .section-divider-line { flex: 1; height: 1px; background: var(--border); }
  .section-divider-label {
    font-size: 11px; font-weight: 700; letter-spacing: 1.2px;
    text-transform: uppercase; color: var(--text3);
    padding: 4px 12px; border-radius: 50px;
    border: 1px solid var(--border);
  }

  .sort-info { font-size: 12px; color: var(--text3); margin-bottom: 12px; }
  .drag-hint { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 5px; margin-bottom: 10px; }

  @media (max-width: 900px) {
    .sidebar { width: 200px; }
    .main { margin-left: 200px; }
  }
  @media (max-width: 640px) {
    .sidebar { display: none; }
    .main { margin-left: 0; }
  }
</style>
</head>
<body>

<!-- SVG defs for half star -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="halfGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="50%" stop-color="transparent"/>
    </linearGradient>
  </defs>
</svg>

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
    </div>
    <div class="logo-text">Rate<span>ify</span></div>
  </div>
  <div class="nav">
    <div class="nav-label">Library</div>
    <div class="nav-item active" data-page="movies" onclick="showPage('movies',this)">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg>
      </div>
      Movies
    </div>
    <div class="nav-item" data-page="series" onclick="showPage('series',this)">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>
      </div>
      Series
    </div>
    <div class="nav-item" data-page="albums" onclick="showPage('albums',this)">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
      </div>
      Albums
    </div>
  </div>
</nav>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="page-title">
      <span class="page-emoji" id="page-emoji">🎬</span>
      <span id="page-heading">Movies</span>
    </div>
    <div class="topbar-actions">
      <div class="view-toggle">
        <button class="view-btn active" id="vBtn-list" onclick="setView('list')" title="List view">
          <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
        </button>
        <button class="view-btn" id="vBtn-grid" onclick="setView('grid')" title="Grid view">
          <svg viewBox="0 0 24 24"><path d="M3 3h7v7H3zm11 0h7v7h-7zM3 14h7v7H3zm11 0h7v7h-7z"/></svg>
        </button>
      </div>
      <button class="btn btn-primary" onclick="openModal()">
        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        Add New
      </button>
    </div>
  </div>

  <div class="content">
    <!-- MOVIES PAGE -->
    <div class="page active" id="page-movies">
      <div id="movies-watchlist-section"></div>
      <div id="movies-watched-section"></div>
    </div>
    <!-- SERIES PAGE -->
    <div class="page" id="page-series">
      <div id="series-watchlist-section"></div>
      <div id="series-watched-section"></div>
    </div>
    <!-- ALBUMS PAGE -->
    <div class="page" id="page-albums">
      <div id="albums-watchlist-section"></div>
      <div id="albums-watched-section"></div>
    </div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Add Movie</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('search',this)">🔍 Smart Search</div>
      <div class="tab" onclick="switchTab('manual',this)">✏️ Manual</div>
    </div>

    <!-- SEARCH TAB -->
    <div id="tab-search">
      <div class="form-group">
        <label class="form-label" id="search-label">Search Movie</label>
        <input type="text" class="form-input" id="searchInput" placeholder="Type to search..." autocomplete="off" oninput="handleSearch(this.value)">
      </div>
      <div class="search-results" id="searchResults"></div>
      <div id="selected-preview" style="display:none;">
        <div style="display:flex; align-items:center; gap:14px; background:var(--bg4); border-radius:var(--radius); padding:14px; border:1px solid var(--green); margin-bottom:18px;">
          <img id="sel-img" src="" style="width:56px;height:56px;border-radius:8px;object-fit:cover;" />
          <div>
            <div id="sel-title" style="font-weight:600;font-size:14px;"></div>
            <div id="sel-sub" style="font-size:12px;color:var(--text3);"></div>
          </div>
          <button onclick="clearSelection()" style="margin-left:auto;background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;">✕</button>
        </div>
      </div>
      <button class="btn btn-primary" style="width:100%;" onclick="addFromSearch()">Add to Watchlist</button>
    </div>

    <!-- MANUAL TAB -->
    <div id="tab-manual" style="display:none;">
      <div class="form-group">
        <label class="form-label" id="manual-name-label">Movie Title</label>
        <input type="text" class="form-input" id="manualTitle" placeholder="Enter title...">
      </div>
      <div class="form-group" id="artist-group" style="display:none;">
        <label class="form-label">Artist / Band</label>
        <input type="text" class="form-input" id="manualArtist" placeholder="Enter artist name...">
      </div>
      <div class="form-group">
        <label class="form-label">Year (optional)</label>
        <input type="text" class="form-input" id="manualYear" placeholder="e.g. 2024">
      </div>
      <div class="form-group">
        <label class="form-label">Cover Image (optional)</label>
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
          <img class="upload-preview" id="uploadPreview">
          <div class="upload-text">Click to upload or <span>browse</span><br>PNG, JPG up to 5MB</div>
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="handleFileUpload(this)">
      </div>
      <button class="btn btn-primary" style="width:100%;" onclick="addManual()">Add to Watchlist</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"><div class="toast-dot"></div><span id="toast-msg"></span></div>

<script>
// ===== STATE =====
let currentPage = 'movies';
let currentView = 'list';
let searchTimeout = null;
let selectedItem = null;
let uploadedImageData = null;
let dragSrcEl = null;

const pageConfig = {
  movies: { emoji: '🎬', label: 'Movies', searchLabel: 'Search Movie', nameLabel: 'Movie Title', placeholder: 'E.g. Oppenheimer', apiType: 'movie', showArtist: false },
  series: { emoji: '📺', label: 'Series', searchLabel: 'Search Series', nameLabel: 'Series Title', placeholder: 'E.g. Breaking Bad', apiType: 'tv', showArtist: false },
  albums: { emoji: '🎵', label: 'Albums', searchLabel: 'Search Album', nameLabel: 'Album Title', placeholder: 'E.g. Blonde', apiType: 'album', showArtist: true }
};

// Load from localStorage
function loadData() {
  try { return JSON.parse(localStorage.getItem('rateify_data') || '{}'); } catch { return {}; }
}
function saveData(data) {
  try { localStorage.setItem('rateify_data', JSON.stringify(data)); } catch {}
}
function getData(page) {
  const d = loadData();
  if (!d[page]) d[page] = { watchlist: [], watched: [] };
  return d[page];
}
function setData(page, pageData) {
  const d = loadData();
  d[page] = pageData;
  saveData(d);
}

// ===== NAVIGATION =====
function showPage(page, el) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  const cfg = pageConfig[page];
  document.getElementById('page-emoji').textContent = cfg.emoji;
  document.getElementById('page-heading').textContent = cfg.label;
  renderPage(page);
}

// ===== RENDER =====
function renderPage(page) {
  const d = getData(page);
  renderWatchlist(page, d.watchlist);
  renderWatched(page, d.watched);
}

function renderWatchlist(page, items) {
  const cfg = pageConfig[page];
  const container = document.getElementById(page + '-watchlist-section');
  if (!container) return;

  if (currentView === 'grid') {
    container.innerHTML = '';
    return;
  }

  container.innerHTML = `
    <div class="section-header">
      <div class="section-title">
        📋 Watchlist <span class="section-count">${items.length}</span>
      </div>
    </div>
  `;

  if (items.length === 0) {
    container.innerHTML += `<div class="empty-state"><div class="empty-icon">${cfg.emoji}</div><div class="empty-title">Your watchlist is empty</div><div class="empty-sub">Add ${cfg.label.toLowerCase()} to get started</div></div>`;
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'cards-grid';
  items.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-img">
        ${item.img ? `<img src="${item.img}" alt="${item.title}" loading="lazy">` : `<span class="placeholder-icon">${cfg.emoji}</span>`}
      </div>
      <div class="card-body">
        <div class="card-title" title="${item.title}">${item.title}</div>
        <div class="card-subtitle">${item.artist ? item.artist + (item.year ? ' · ' + item.year : '') : (item.year || 'Unknown year')}</div>
        <div class="card-actions">
          <button class="btn-watched" onclick="markWatched('${page}', ${idx})">
            ${page === 'albums' ? '✓ Listened' : '✓ Watched'}
          </button>
          <button class="btn-del" onclick="deleteItem('${page}','watchlist',${idx})" title="Remove">🗑</button>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
  container.appendChild(grid);
  container.innerHTML += '<hr class="divider">';
}

function renderWatched(page, items) {
  const cfg = pageConfig[page];
  const container = document.getElementById(page + '-watched-section');
  if (!container) return;

  // Grid view
  if (currentView === 'grid') {
    const watchlistContainer = document.getElementById(page + '-watchlist-section');
    if (watchlistContainer) watchlistContainer.innerHTML = '';

    container.innerHTML = `
      <div class="section-header">
        <div class="section-title">
          ⭐ Rated ${cfg.label} <span class="section-count">${items.length}</span>
        </div>
        <div class="view-toggle" style="margin-left:auto;">
        </div>
      </div>
    `;
    if (items.length === 0) {
      container.innerHTML += `<div class="empty-state"><div class="empty-icon">${cfg.emoji}</div><div class="empty-title">No rated ${cfg.label.toLowerCase()} yet</div><div class="empty-sub">Mark items as watched to rate them</div></div>`;
      return;
    }
    const gridEl = document.createElement('div');
    gridEl.className = 'grid-view active';
    const sorted = [...items].sort((a, b) => (b.rating || 0) - (a.rating || 0));
    sorted.forEach((item, idx) => {
      const cell = document.createElement('div');
      cell.className = 'grid-cell';
      cell.innerHTML = `
        ${item.img ? `<img src="${item.img}" alt="${item.title}">` : `<div class="grid-placeholder">${cfg.emoji}</div>`}
        <div class="grid-rank-badge">#${idx + 1}</div>
        <div class="grid-overlay">
          <div class="grid-title">${item.title}</div>
          <div class="grid-rating-stars">${renderStarsSVG(item.rating || 0, 'sm')}<span style="font-size:10px;color:#F59E0B;margin-left:3px;font-weight:700;">${(item.rating||0).toFixed(1)}</span></div>
        </div>
      `;
      gridEl.appendChild(cell);
    });
    container.appendChild(gridEl);
    return;
  }

  container.innerHTML = `
    <div class="section-header">
      <div class="section-title">
        ⭐ ${page === 'albums' ? 'Listened' : 'Watched'} <span class="section-count">${items.length}</span>
      </div>
    </div>
  `;

  if (items.length === 0) {
    container.innerHTML += `<div class="empty-state"><div class="empty-icon">⭐</div><div class="empty-title">Nothing rated yet</div><div class="empty-sub">Mark ${cfg.label.toLowerCase()} as ${page === 'albums' ? 'listened' : 'watched'} to rate them</div></div>`;
    return;
  }

  container.innerHTML += `<div class="drag-hint">☰ Drag to reorder manually</div>`;
  const list = document.createElement('div');
  list.className = 'ranked-list';
  list.id = `ranked-${page}`;

  items.forEach((item, idx) => {
    const el = document.createElement('div');
    el.className = 'ranked-item';
    el.draggable = true;
    el.dataset.idx = idx;
    const rankClass = idx === 0 ? 'top1' : idx === 1 ? 'top2' : idx === 2 ? 'top3' : '';
    el.innerHTML = `
      <div class="drag-handle">☰</div>
      <div class="rank-num ${rankClass}">${idx + 1}</div>
      <div class="ranked-thumb">
        ${item.img ? `<img src="${item.img}" alt="">` : cfg.emoji}
      </div>
      <div class="ranked-info">
        <div class="ranked-title">${item.title}</div>
        <div class="ranked-sub">${item.artist ? item.artist + (item.year ? ' · ' + item.year : '') : (item.year || '')}</div>
        <div class="star-rating" id="stars-${page}-${idx}">
          ${renderStarsInteractive(page, idx, item.rating || 0)}
        </div>
      </div>
      <button class="btn-del" onclick="deleteItem('${page}','watched',${idx})" title="Remove">🗑</button>
    `;
    setupDrag(el, page);
    list.appendChild(el);
  });

  container.appendChild(list);
}

function renderStarsSVG(rating, size) {
  let html = '';
  const sz = size === 'sm' ? 10 : 14;
  for (let i = 1; i <= 5; i++) {
    if (rating >= i) {
      html += `<svg width="${sz}" height="${sz}" viewBox="0 0 24 24"><path fill="#F59E0B" d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`;
    } else if (rating >= i - 0.5) {
      html += `<svg width="${sz}" height="${sz}" viewBox="0 0 24 24"><defs><linearGradient id="hg${i}" x1="0" x2="1"><stop offset="50%" stop-color="#F59E0B"/><stop offset="50%" stop-color="transparent"/></linearGradient></defs><path fill="url(#hg${i})" stroke="#F59E0B" stroke-width="1" d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`;
    } else {
      html += `<svg width="${sz}" height="${sz}" viewBox="0 0 24 24"><path fill="none" stroke="#555" stroke-width="1.5" d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`;
    }
  }
  return html;
}

function renderStarsInteractive(page, idx, currentRating) {
  let html = '';
  for (let i = 1; i <= 5; i++) {
    html += `<div class="star-wrap" onmousemove="hoverStar(event,'${page}',${idx},${i})" onmouseleave="unhoverStar('${page}',${idx},${currentRating})" onclick="handleStarClick(event,'${page}',${idx},${i})">`;
    html += starSVG(currentRating, i);
    html += `</div>`;
  }
  html += `<span class="rating-label">${currentRating > 0 ? currentRating.toFixed(1) : '—'}</span>`;
  return html;
}

function starSVG(rating, i) {
  if (rating >= i) {
    return `<svg viewBox="0 0 24 24"><path class="star-full" d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`;
  } else if (rating >= i - 0.5) {
    return `<svg viewBox="0 0 24 24"><path class="star-half" d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`;
  } else {
    return `<svg viewBox="0 0 24 24"><path class="star-empty" d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`;
  }
}

function hoverStar(e, page, idx, star) {
  const rect = e.currentTarget.getBoundingClientRect();
  const half = e.clientX < rect.left + rect.width / 2;
  const hoverRating = half ? star - 0.5 : star;
  const container = document.getElementById(`stars-${page}-${idx}`);
  if (!container) return;
  const stars = container.querySelectorAll('.star-wrap');
  stars.forEach((sw, i) => {
    sw.querySelector('svg').outerHTML;
    sw.innerHTML = starSVG(hoverRating, i + 1);
  });
  const label = container.querySelector('.rating-label');
  if (label) label.textContent = hoverRating.toFixed(1);
}

function unhoverStar(page, idx, currentRating) {
  const container = document.getElementById(`stars-${page}-${idx}`);
  if (!container) return;
  const stars = container.querySelectorAll('.star-wrap');
  stars.forEach((sw, i) => {
    sw.innerHTML = starSVG(currentRating, i + 1);
  });
  const label = container.querySelector('.rating-label');
  if (label) label.textContent = currentRating > 0 ? currentRating.toFixed(1) : '—';
}

function handleStarClick(e, page, idx, star) {
  const rect = e.currentTarget.getBoundingClientRect();
  const half = e.clientX < rect.left + rect.width / 2;
  const rating = half ? star - 0.5 : star;
  const d = getData(page);
  d.watched[idx].rating = rating;
  // re-sort by rating
  d.watched.sort((a, b) => (b.rating || 0) - (a.rating || 0));
  setData(page, d);
  renderPage(page);
  showToast(`Rated ${d.watched.find(i => i.rating === rating)?.title || ''} ★ ${rating}`);
}

// ===== DRAG & DROP =====
function setupDrag(el, page) {
  el.addEventListener('dragstart', e => {
    dragSrcEl = el;
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', el.dataset.idx);
  });
  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    document.querySelectorAll('.ranked-item').forEach(i => i.classList.remove('drag-over'));
  });
  el.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    el.classList.add('drag-over');
  });
  el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
  el.addEventListener('drop', e => {
    e.preventDefault();
    el.classList.remove('drag-over');
    if (dragSrcEl === el) return;
    const fromIdx = parseInt(dragSrcEl.dataset.idx);
    const toIdx = parseInt(el.dataset.idx);
    const d = getData(page);
    const arr = d.watched;
    const [moved] = arr.splice(fromIdx, 1);
    arr.splice(toIdx, 0, moved);
    setData(page, d);
    renderPage(page);
  });
}

// ===== ACTIONS =====
function markWatched(page, idx) {
  const d = getData(page);
  const [item] = d.watchlist.splice(idx, 1);
  item.rating = 0;
  d.watched.push(item);
  d.watched.sort((a, b) => (b.rating || 0) - (a.rating || 0));
  setData(page, d);
  renderPage(page);
  showToast(page === 'albums' ? `Marked "${item.title}" as listened` : `Marked "${item.title}" as watched`);
}

function deleteItem(page, list, idx) {
  const d = getData(page);
  d[list].splice(idx, 1);
  setData(page, d);
  renderPage(page);
  showToast('Item removed');
}

// ===== VIEW TOGGLE =====
function setView(v) {
  currentView = v;
  document.getElementById('vBtn-list').classList.toggle('active', v === 'list');
  document.getElementById('vBtn-grid').classList.toggle('active', v === 'grid');
  renderPage(currentPage);
}

// ===== MODAL =====
function openModal() {
  const cfg = pageConfig[currentPage];
  document.getElementById('modal-title').textContent = 'Add ' + cfg.label.slice(0, -1);
  document.getElementById('search-label').textContent = cfg.searchLabel;
  document.getElementById('manual-name-label').textContent = cfg.nameLabel;
  document.getElementById('artist-group').style.display = cfg.showArtist ? 'block' : 'none';
  document.getElementById('searchInput').value = '';
  document.getElementById('searchResults').innerHTML = '';
  document.getElementById('searchResults').classList.remove('open');
  document.getElementById('selected-preview').style.display = 'none';
  document.getElementById('manualTitle').value = '';
  document.getElementById('manualArtist').value = '';
  document.getElementById('manualYear').value = '';
  document.getElementById('uploadPreview').classList.remove('show');
  uploadedImageData = null;
  selectedItem = null;
  document.getElementById('addModal').classList.add('open');
}
function closeModal() {
  document.getElementById('addModal').classList.remove('open');
}
document.getElementById('addModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-search').style.display = tab === 'search' ? 'block' : 'none';
  document.getElementById('tab-manual').style.display = tab === 'manual' ? 'block' : 'none';
}

// ===== SEARCH =====
async function handleSearch(q) {
  const res = document.getElementById('searchResults');
  if (!q || q.length < 2) { res.classList.remove('open'); return; }
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(async () => {
    res.innerHTML = '<div class="search-loading">🔍 Searching...</div>';
    res.classList.add('open');
    try {
      const type = pageConfig[currentPage].apiType;
      let results = [];
      if (type === 'album') {
        results = await searchAlbums(q);
      } else {
        results = await searchTMDB(q, type);
      }
      if (results.length === 0) {
        res.innerHTML = '<div class="search-loading">No results found</div>';
        return;
      }
      res.innerHTML = results.map((r, i) => `
        <div class="search-result-item" onclick="selectItem(${i})">
          <img class="search-result-img" src="${r.img || ''}" onerror="this.style.display='none'" loading="lazy">
          <div>
            <div class="search-result-title">${r.title}</div>
            <div class="search-result-sub">${r.sub}</div>
          </div>
        </div>
      `).join('');
      // Store results
      res.dataset.results = JSON.stringify(results);
    } catch (err) {
      res.innerHTML = '<div class="search-loading">Error searching. Try manual entry.</div>';
    }
  }, 400);
}

async function searchTMDB(q, type) {
  const key = '4a7e6d3f1b9c8e2d0f5a7c9b3e1d4f6a'; // public demo key placeholder
  // Use OMDB or open API
  const url = `https://www.omdbapi.com/?s=${encodeURIComponent(q)}&type=${type === 'tv' ? 'series' : 'movie'}&apikey=trilogy`;
  // Fallback: use a CORS-friendly open movie API
  try {
    const r = await fetch(`https://api.themoviedb.org/3/search/${type}?query=${encodeURIComponent(q)}&language=en-US&page=1`, {
      headers: { 'Authorization': 'Bearer eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiJkZW1vIiwic3ViIjoiZGVtbyJ9.demo' }
    });
    // If TMDB fails (auth), use backup
    throw new Error('use backup');
  } catch {
    // Use free Open Movie Database
    try {
      const r = await fetch(`https://www.omdbapi.com/?s=${encodeURIComponent(q)}&type=${type === 'tv' ? 'series' : 'movie'}&apikey=aa9290ba`);
      const data = await r.json();
      if (data.Search) {
        return data.Search.slice(0, 8).map(m => ({
          title: m.Title,
          sub: m.Year + (m.Type ? ' · ' + m.Type : ''),
          img: m.Poster !== 'N/A' ? m.Poster : '',
          year: m.Year,
          artist: ''
        }));
      }
    } catch {}
    // Last fallback: mock results
    return generateMockResults(q, type);
  }
}

async function searchAlbums(q) {
  try {
    const r = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(q)}&media=music&entity=album&limit=8`);
    const data = await r.json();
    return data.results.map(a => ({
      title: a.collectionName,
      sub: a.artistName + ' · ' + (a.releaseDate ? a.releaseDate.slice(0,4) : ''),
      img: a.artworkUrl100?.replace('100x100', '200x200') || '',
      year: a.releaseDate ? a.releaseDate.slice(0,4) : '',
      artist: a.artistName
    }));
  } catch {
    return generateMockResults(q, 'album');
  }
}

function generateMockResults(q, type) {
  // Fallback with placeholder results
  const types = type === 'album' ? ['Album', 'EP', 'LP'] : type === 'tv' ? ['TV Series', 'Mini-series'] : ['Movie', 'Film'];
  return [1,2,3].map(i => ({
    title: `${q} ${i > 1 ? i : ''}`.trim(),
    sub: `${2020 + i} · ${types[i % types.length]}`,
    img: '',
    year: String(2020 + i),
    artist: type === 'album' ? 'Unknown Artist' : ''
  }));
}

function selectItem(i) {
  const res = document.getElementById('searchResults');
  const results = JSON.parse(res.dataset.results || '[]');
  const item = results[i];
  if (!item) return;
  selectedItem = item;
  document.getElementById('sel-img').src = item.img || '';
  document.getElementById('sel-img').style.display = item.img ? 'block' : 'none';
  document.getElementById('sel-title').textContent = item.title;
  document.getElementById('sel-sub').textContent = item.sub;
  document.getElementById('selected-preview').style.display = 'flex';
  res.classList.remove('open');
  document.getElementById('searchInput').value = item.title;
}
function clearSelection() {
  selectedItem = null;
  document.getElementById('selected-preview').style.display = 'none';
  document.getElementById('searchInput').value = '';
}

function addFromSearch() {
  if (!selectedItem) { showToast('Please select an item first'); return; }
  addItem({ title: selectedItem.title, img: selectedItem.img, year: selectedItem.year, artist: selectedItem.artist || '' });
  closeModal();
}

function addManual() {
  const title = document.getElementById('manualTitle').value.trim();
  if (!title) { showToast('Please enter a title'); return; }
  const year = document.getElementById('manualYear').value.trim();
  const artist = document.getElementById('manualArtist').value.trim();
  addItem({ title, img: uploadedImageData || '', year, artist });
  closeModal();
}

function addItem(item) {
  const d = getData(currentPage);
  d.watchlist.unshift(item);
  setData(currentPage, d);
  renderPage(currentPage);
  showToast(`"${item.title}" added to watchlist`);
}

// ===== FILE UPLOAD =====
function handleFileUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    uploadedImageData = e.target.result;
    const prev = document.getElementById('uploadPreview');
    prev.src = uploadedImageData;
    prev.classList.add('show');
  };
  reader.readAsDataURL(file);
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ===== INIT =====
renderPage('movies');
</script>
</body>
</html>
